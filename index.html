<style>
body {
    margin: 0;

    text-align: center;

    font-size: 28px;

h2 {
    margin: 30px 20px 10px;
    font-weight: normal;
    border-bottom: 1px solid #333;
    padding-bottom: 5px;
}

/* GALLERY */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 15px;
    padding: 20px;
}

.gallery img {
    width: 100%;
    border-radius: 8px;
    transition: 0.2s;
}

.gallery img:hover {
    transform: scale(1.05);
}

/* MANGA LIST */
.manga-list {
    padding: 20px;
}

.manga-item {
    margin-bottom: 10px;
}

.manga-item a {
    color: #ccc;
    text-decoration: none;
    font-size: 18px;
}

.manga-item a:hover {
    color: white;
    text-decoration: underline;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 15px;
    font-size: 12px;
    color: #666;
}
