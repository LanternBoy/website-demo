<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Andres Villarosa</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0d0d0d;
    color: #eee;
}

header {
    text-align: center;
    padding: 20px;
    background: black;
    font-size: 28px;
    letter-spacing: 2px;
}

/* SECTION TITLES */
h2 {
    margin: 30px 20px 10px;
    font-weight: normal;
    border-bottom: 1px solid #333;
    padding-bottom: 5px;
}

/* GALLERY */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 15px;
    padding: 20px;
}

.gallery img {
    width: 100%;
    border-radius: 8px;
    transition: 0.2s;
    cursor: pointer;
}

.gallery img:hover {
    transform: scale(1.05);
}

/* LIGHTBOX */
.lightbox {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    background: rgba(0,0,0,0.9);
    display: none;

    justify-content: center;
    align-items: center;
    z-index: 999;
}

.lightbox img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 10px;
}

/* MANGA LIST */
.manga-list {
    padding: 20px;
}

.manga-item {
    margin-bottom: 10px;
}

.manga-item a {
    color: #ccc;
    text-decoration: none;
    font-size: 18px;
}

.manga-item a:hover {
    color: white;
    text-decoration: underline;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 15px;
    font-size: 12px;
    color: #666;
}
</style>
</head>

<body>

<header>
    Andres Villarosa
</header>

<!-- MANGA -->
<h2>One-Shots</h2>
<div class="manga-list">

    <div class="manga-item">
        <a href="assets/oneshots/tinola-war/tinola-war.html">Tinola War</a>
    </div>

    <div class="manga-item">
        <a href="manga2.html">One-shot #2 – Title Here</a>
    </div>

</div>

<!-- ILLUSTRATIONS -->
<h2>Illustrations</h2>
<div class="gallery">
    <img src="art1.jpg" draggable="false">
    <img src="assets/illustrations/page2.jpg" draggable="false">
    <img src="assets/illustrations/page3.jpg" draggable="false">
</div>

<!-- LIGHTBOX (popup viewer) -->
<div class="lightbox" id="lightbox">
    <img id="lightbox-img">
</div>

<footer>
    © 2026 Andres Villarosa
</footer>

<script>
// LIGHTBOX FUNCTION
const images = document.querySelectorAll(".gallery img");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");

images.forEach(img => {
    img.addEventListener("click", () => {
        lightbox.style.display = "flex";
        lightboxImg.src = img.src;
    });
});

// CLOSE LIGHTBOX
lightbox.addEventListener("click", () => {
    lightbox.style.display = "none";
});

// OPTIONAL: disable right-click
document.addEventListener("contextmenu", e => e.preventDefault());
</script>

</body>
</html>
