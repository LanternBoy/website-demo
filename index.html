<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Andres Villarosa</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0d0d0d;
    color: #eee;
}

/* HEADER */
header {
    text-align: center;
    padding: 20px;
    background: black;
    font-size: 28px;
    letter-spacing: 2px;
}

/* SECTIONS */
h2 {
    margin: 30px 20px 10px;
    border-bottom: 1px solid #333;
    padding-bottom: 5px;
}

/* ONE SHOTS */
.manga-list {
    padding: 20px;
}

.manga-item {
    margin-bottom: 10px;
}

.manga-item a {
    color: #ccc;
    text-decoration: none;
    font-size: 18px;
    cursor: pointer;
}

.manga-item a:hover {
    color: white;
}

/* GALLERY */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 15px;
    padding: 20px;
}

.gallery img {
    width: 100%;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
    user-select: none;
}

.gallery img:hover {
    transform: scale(1.05);
}

/* =========================
   LIGHTBOX (ILLUSTRATIONS)
========================= */
.lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(12px);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 999;
}

.lightbox img {
    max-width: 90%;
    max-height: 90%;
    cursor: grab;
}

/* ARROWS */
.arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 40px;
    color: white;
    background: rgba(0,0,0,0.4);
    border: none;
    cursor: pointer;
    padding: 10px 15px;
}

.arrow.left { left: 20px; }
.arrow.right { right: 20px; }

/* UI */
.ui {
    position: fixed;
    top: 20px;
    right: 20px;
    display: none; /* 👈 IMPORTANT FIX */
    gap: 10px;
    z-index: 1000;
}

.ui button {
    background: rgba(0,0,0,0.6);
    color: white;
    border: none;
    padding: 8px 12px;
    cursor: pointer;
}

/* =========================
   ONE-SHOT MODAL
========================= */
.modal-bg {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 2000;
}

.modal {
    width: 750px;
    max-width: 90%;
    background: #111;
    border-radius: 12px;
    padding: 20px;
    display: flex;
    gap: 20px;
    box-shadow: 0 0 30px rgba(0,0,0,0.8);
}

.modal img {
    width: 250px;
    border-radius: 10px;
}

.modal-year {
    font-size: 16px;   /* smaller than title */
    color: #888;
    margin-top: 5px;
    margin-bottom: 10px;
}

.modal h1 {
    margin: 0;
}

.modal p {
    color: #bbb;
    line-height: 1.5;
}

.read-btn {
    display: inline-block;
    margin-top: 15px;
    padding: 10px 15px;
    background: white;
    color: black;
    text-decoration: none;
    border-radius: 6px;
    font-weight: bold;
}

/* lock scroll */
body.no-scroll {
    overflow: hidden;
}

/* RIGHT CLICK BLOCK */
body {
    -webkit-user-select: none;
    user-select: none;
}
</style>
</head>

<body>

<header>Andres Villarosa(Website Test)</header>

<!-- ONE SHOTS -->
<h2>One-Shots</h2>
<div class="manga-list">

    <div class="manga-item">
        <a onclick="openModal('tinola')">Tinola War</a>
    </div>
    <div class="manga-item">
    <a onclick="openModal('projectx')">Project X</a>
    </div>

</div>

<!-- ILLUSTRATIONS -->
<h2>Illustrations</h2>
<div class="gallery">
    <img src="art1.jpg">
    <img src="assets/illustrations/page2.jpg">
    <img src="assets/illustrations/page3.jpg">
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">

    <button class="arrow left" id="prev">‹</button>
    <button class="arrow right" id="next">›</button>

    <img id="img">
</div>

<!-- UI -->
<div class="ui">
    <button onclick="zoomIn()">+</button>
    <button onclick="zoomOut()">−</button>
    <button onclick="resetZoom()">Reset</button>
</div>

<!-- ONE-SHOT MODAL -->
<div class="modal-bg" id="modalBg">

    <div class="modal">

        <img id="modalImg">

        <div>
            <h1 id="modalTitle"></h1>
            <div id="modalYear" class="modal-year"></div>
            <p id="modalDesc"></p>

            <!-- ✅ READ BUTTON OPENS NEW TAB -->
            <a id="readBtn" class="read-btn" target="_blank">Read</a>
        </div>

    </div>

</div>

<script>

/* =========================
   ONE-SHOT DATA
========================= */
const data = {
    tinola: {
        img: "assets/oneshots/tinola-war/cover.jpg",
        title: "Tinola War",
        year: "2026",
        desc: "A chaotic war story where tinola becomes a weapon of survival and absurd logic.",
        link: "assets/oneshots/tinola-war/tinola-war.html"
    },
    projectx: {
    img: "assets/oneshots/new-folder/cover.jpg",
    title: "Project X",
    year: "2025",
    desc: "The story is short so it's just a short description of the story.",
    link: "assets/oneshots/project-x/project-x.html"
}
};

/* =========================
   MODAL SYSTEM
========================= */
const modalBg = document.getElementById("modalBg");
const modalImg = document.getElementById("modalImg");
const modalTitle = document.getElementById("modalTitle");
const modalDesc = document.getElementById("modalDesc");
const readBtn = document.getElementById("readBtn");

function openModal(key) {
    const item = data[key];

    modalImg.src = item.img;
    modalTitle.textContent = item.title;
    modalYear.textContent = item.year;
    modalDesc.textContent = item.desc;

    readBtn.href = item.link;
    readBtn.target = "_blank";

    modalBg.style.display = "flex";
    document.body.classList.add("no-scroll");
}

/* close modal (click outside) */
modalBg.onclick = (e) => {
    if (e.target === modalBg) {
        modalBg.style.display = "none";
        document.body.classList.remove("no-scroll");
    }
};

/* ESC key */
window.addEventListener("keydown", (e) => {
    if (e.key === "Escape") {
        modalBg.style.display = "none";
        document.body.classList.remove("no-scroll");
    }
});

/* =========================
   LIGHTBOX SYSTEM
========================= */
const images = document.querySelectorAll(".gallery img");
const lightbox = document.getElementById("lightbox");
const img = document.getElementById("img");

const prevBtn = document.getElementById("prev");
const nextBtn = document.getElementById("next");

let index = 0;

/* zoom/drag */
let scale = 1;
let x = 0, y = 0;
let dragging = false;
let startX, startY;

/* open image */
images.forEach((el, i) => {
    el.onclick = () => {
        index = i;
        open();
    };
});

function open() {
    lightbox.style.display = "flex";
    document.body.classList.add("no-scroll");

    img.src = images[index].src;
    resetZoom();

    document.querySelector(".ui").style.display = "flex"; // 👈 SHOW
}

/* close */
lightbox.onclick = (e) => {
    if (e.target === lightbox) closeLightbox();
};

function closeLightbox() {
    lightbox.style.display = "none";
    document.body.classList.remove("no-scroll");

    document.querySelector(".ui").style.display = "none"; // 👈 HIDE
}

/* update */
function update() {
    img.style.transform = `scale(${scale}) translate(${x}px, ${y}px)`;
}

/* zoom */
function zoomIn() {
    scale = Math.min(scale + 0.3, 5);
    update();
}

function zoomOut() {
    scale = Math.max(scale - 0.3, 1);
    update();
}

function resetZoom() {
    scale = 1;
    x = 0;
    y = 0;
    update();
}

/* drag */
img.addEventListener("mousedown", (e) => {
    dragging = true;
    startX = e.clientX - x;
    startY = e.clientY - y;
    e.preventDefault();
});

window.addEventListener("mousemove", (e) => {
    if (!dragging) return;

    x = e.clientX - startX;
    y = e.clientY - startY;
    update();
});

window.addEventListener("mouseup", () => {
    dragging = false;
});

/* scroll zoom */
lightbox.addEventListener("wheel", (e) => {
    e.preventDefault();

    scale += e.deltaY * -0.001;
    scale = Math.min(Math.max(1, scale), 5);

    update();
}, { passive: false });

/* arrows */
prevBtn.onclick = () => {
    index = (index - 1 + images.length) % images.length;
    open();
};

nextBtn.onclick = () => {
    index = (index + 1) % images.length;
    open();
};

/* keyboard */
window.addEventListener("keydown", (e) => {
    if (lightbox.style.display !== "flex") return;

    if (e.key === "ArrowRight") nextBtn.click();
    if (e.key === "ArrowLeft") prevBtn.click();
});

/* right click disable */
document.addEventListener("contextmenu", e => e.preventDefault());

</script>

</body>
