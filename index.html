<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Andres Villarosa</title>

<style>
body {
    margin: 0;
    background: #0d0d0d;
    color: #eee;
    font-family: Arial;
}

header {
    text-align: center;
    padding: 20px;
    background: black;
    font-size: 28px;
}

/* SECTION TITLES */
h2 {
    margin: 30px 20px 10px;
    border-bottom: 1px solid #333;
    padding-bottom: 5px;
}

/* ONE SHOTS */
.manga-list {
    padding: 20px;
}

.manga-item {
    margin-bottom: 10px;
}

.manga-item a {
    color: #ccc;
    text-decoration: none;
    font-size: 18px;
}

.manga-item a:hover {
    color: white;
}

/* GALLERY */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 15px;
    padding: 20px;
}

.gallery img {
    width: 100%;
    cursor: pointer;
    border-radius: 8px;
}

/* LIGHTBOX */
.lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 999;
}

.lightbox img {
    max-width: 90%;
    max-height: 90%;
    cursor: grab;
    transition: transform 0.1s;
}

/* UI CONTROLS */
.ui {
    position: fixed;
    top: 20px;
    right: 20px;
    display: flex;
    gap: 10px;
    z-index: 1000;
}

.ui button {
    background: rgba(0,0,0,0.6);
    color: white;
    border: none;
    padding: 8px 12px;
    cursor: pointer;
}

/* COUNTER */
.counter {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: rgba(0,0,0,0.6);
    padding: 6px 10px;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 15px;
    font-size: 12px;
    color: #666;
}
</style>
</head>

<body>

<header>
    Andres Villarosa
</header>

<!-- ONE SHOTS -->
<h2>One-Shots</h2>
<div class="manga-list">

    <div class="manga-item">
        <a href="assets/oneshots/tinola-war/tinola-war.html">Tinola War</a>
    </div>

    <div class="manga-item">
        <a href="manga2.html">One-shot #2 – Title Here</a>
    </div>

</div>

<!-- ILLUSTRATIONS -->
<h2>Illustrations</h2>
<div class="gallery">
    <img src="art1.jpg" draggable="false">
    <img src="assets/illustrations/page2.jpg" draggable="false">
    <img src="assets/illustrations/page3.jpg" draggable="false">
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
    <img id="img">
</div>

<!-- UI -->
<div class="ui">
    <button onclick="zoomIn()">+</button>
    <button onclick="zoomOut()">−</button>
    <button onclick="resetZoom()">Reset</button>
    <button onclick="toggleFull()">⛶</button>
</div>

<!-- COUNTER -->
<div class="counter" id="counter">1 / 1</div>

<footer>
    © 2026 Andres Villarosa
</footer>

<script>
const images = document.querySelectorAll(".gallery img");
const lightbox = document.getElementById("lightbox");
const img = document.getElementById("img");
const counter = document.getElementById("counter");

let index = 0;

// PRELOAD
images.forEach(i => {
    const preload = new Image();
    preload.src = i.src;
});

// ZOOM + DRAG
let scale = 1, x = 0, y = 0;
let dragging = false, startX, startY;

// OPEN
images.forEach((el, i) => {
    el.onclick = () => {
        index = i;
        open();
    };
});

function open() {
    lightbox.style.display = "flex";
    img.src = images[index].src;
    resetZoom();
    updateCounter();
}

function updateCounter() {
    counter.textContent = `${index + 1} / ${images.length}`;
}

// CLOSE
lightbox.onclick = e => {
    if (e.target === lightbox) lightbox.style.display = "none";
};

// ZOOM BUTTONS
function zoomIn() {
    scale = Math.min(scale + 0.3, 5);
    update();
}
function zoomOut() {
    scale = Math.max(scale - 0.3, 1);
    update();
}
function resetZoom() {
    scale = 1; x = 0; y = 0;
    update();
}

function update() {
    img.style.transform = `scale(${scale}) translate(${x}px, ${y}px)`;
}

// SCROLL ZOOM
lightbox.addEventListener("wheel", e => {
    e.preventDefault();
    scale += e.deltaY * -0.001;
    scale = Math.min(Math.max(1, scale), 5);
    update();
});

// DRAG
img.onmousedown = e => {
    dragging = true;
    startX = e.clientX - x;
    startY = e.clientY - y;
};

window.onmousemove = e => {
    if (!dragging) return;
    x = e.clientX - startX;
    y = e.clientY - startY;
    update();
};

window.onmouseup = () => dragging = false;

// DOUBLE CLICK ZOOM
img.ondblclick = () => {
    scale = scale === 1 ? 2 : 1;
    update();
};

// KEYBOARD
window.onkeydown = e => {
    if (lightbox.style.display !== "flex") return;

    if (e.key === "ArrowRight") {
        index = (index + 1) % images.length;
        open();
    }

    if (e.key === "ArrowLeft") {
        index = (index - 1 + images.length) % images.length;
        open();
    }

    if (e.key === "Escape") {
        lightbox.style.display = "none";
    }
};

// FULLSCREEN
function toggleFull() {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
    } else {
        document.exitFullscreen();
    }
}

// OPTIONAL: disable right-click
document.addEventListener("contextmenu", e => e.preventDefault());
</script>

</body>
</html>
