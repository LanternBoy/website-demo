<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Andres Villarosa</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0d0d0d;
    color: #eee;
}

/* HEADER */
header {
    text-align: center;
    padding: 20px;
    background: black;
    font-size: 28px;
    letter-spacing: 2px;
}

/* SECTION TITLES */
h2 {
    margin: 30px 20px 10px;
    font-weight: normal;
    border-bottom: 1px solid #333;
    padding-bottom: 5px;
}

/* ONE SHOTS */
.manga-list {
    padding: 20px;
}

.manga-item {
    margin-bottom: 10px;
}

.manga-item a {
    color: #ccc;
    text-decoration: none;
    font-size: 18px;
}

.manga-item a:hover {
    color: white;
}

/* GALLERY */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 15px;
    padding: 20px;
}

.gallery img {
    width: 100%;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
}

.gallery img:hover {
    transform: scale(1.05);
}

/* LIGHTBOX (UPDATED ONLY) */
.lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(12px);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 999;
}

/* IMAGE */
.lightbox img {
    max-width: 90%;
    max-height: 90%;
    cursor: grab;
    user-select: none;
    transition: transform 0.05s;
}

/* UI CONTROLS (kept) */
.ui {
    position: fixed;
    top: 20px;
    right: 20px;
    display: flex;
    gap: 10px;
    z-index: 1000;
}

.ui button {
    background: rgba(0,0,0,0.6);
    color: white;
    border: none;
    padding: 8px 12px;
    cursor: pointer;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 15px;
    font-size: 12px;
    color: #666;
}
</style>
</head>

<body>

<header>
    Andres Villarosa
</header>

<!-- ONE SHOTS (UNCHANGED) -->
<h2>One-Shots</h2>
<div class="manga-list">

    <div class="manga-item">
        <a href="assets/oneshots/tinola-war/tinola-war.html">Tinola War</a>
    </div>

    <div class="manga-item">
        <a href="manga2.html">One-shot #2 – Title Here</a>
    </div>

</div>

<!-- ILLUSTRATIONS (UNCHANGED) -->
<h2>Illustrations</h2>
<div class="gallery">
    <img src="art1.jpg">
    <img src="assets/illustrations/page2.jpg">
    <img src="assets/illustrations/page3.jpg">
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
    <img id="img">
</div>

<!-- CONTROLS -->
<div class="ui">
    <button onclick="zoomIn()">+</button>
    <button onclick="zoomOut()">−</button>
    <button onclick="resetZoom()">Reset</button>
</div>

<footer>
    © 2026 Andres Villarosa
</footer>

<script>
const images = document.querySelectorAll(".gallery img");
const lightbox = document.getElementById("lightbox");
const img = document.getElementById("img");

let index = 0;

/* ===== ZOOM + DRAG STATE ===== */
let scale = 1;
let x = 0, y = 0;
let dragging = false;
let startX, startY;

/* ===== OPEN IMAGE ===== */
images.forEach((el, i) => {
    el.addEventListener("click", () => {
        index = i;
        openImage();
    });
});

function openImage() {
    lightbox.style.display = "flex";
    img.src = images[index].src;
    resetZoom();
}

/* ===== CLOSE ===== */
lightbox.addEventListener("click", (e) => {
    if (e.target === lightbox) {
        lightbox.style.display = "none";
    }
});

/* ===== UPDATE TRANSFORM ===== */
function update() {
    img.style.transform = `scale(${scale}) translate(${x}px, ${y}px)`;
}

/* ===== ZOOM BUTTONS ===== */
function zoomIn() {
    scale = Math.min(scale + 0.3, 5);
    update();
}

function zoomOut() {
    scale = Math.max(scale - 0.3, 1);
    update();
}

function resetZoom() {
    scale = 1;
    x = 0;
    y = 0;
    update();
}

/* ===== HOLD + DRAG (FIXED) ===== */
img.addEventListener("mousedown", (e) => {
    dragging = true;
    startX = e.clientX - x;
    startY = e.clientY - y;
    img.style.cursor = "grabbing";
});

window.addEventListener("mousemove", (e) => {
    if (!dragging) return;

    x = e.clientX - startX;
    y = e.clientY - startY;
    update();
});

window.addEventListener("mouseup", () => {
    dragging = false;
    img.style.cursor = "grab";
});

/* ===== ARROW KEYS ===== */
window.addEventListener("keydown", (e) => {
    if (lightbox.style.display !== "flex") return;

    if (e.key === "ArrowRight") {
        index = (index + 1) % images.length;
        openImage();
    }

    if (e.key === "ArrowLeft") {
        index = (index - 1 + images.length) % images.length;
        openImage();
    }

    if (e.key === "Escape") {
        lightbox.style.display = "none";
    }
});
</script>

</body>
</html>
