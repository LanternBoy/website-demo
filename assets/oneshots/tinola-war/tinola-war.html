<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tinola War</title>

<style>
body {
    margin: 0;
    background: #000;
    color: #fff;
    font-family: Arial;
}
/* PAGE WRAPPER */
.page {
    position: relative;
    display: flex;
    justify-content: center;
}

/* PAGE NUMBER */
.page-num {
    position: absolute;
    right: 10px;
    bottom: 10px;
    background: rgba(0,0,0,0.6);
    color: #fff;
    font-size: 12px;
    padding: 4px 6px;
    border-radius: 4px;
    pointer-events: none;
}
/* PAGE COUNTER */
.page-counter {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: rgba(0,0,0,0.7);
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 14px;
    z-index: 1000;
}

/* READER */
.reader {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
}

/* normal pages */
.reader img {
    width: 100%;
    max-width: 800px;
    height: auto;
}

/* spreads */
.reader img.spread {
    max-width: 1400px;
}
</style>
</head>

<body>

<!-- PAGE COUNTER -->
<div class="page-counter" id="counter">1 / 1</div>

<div class="reader">

    <!-- PAGE 1 -->
    <div class="page">
        <img src="page001.jpg" data-pages="1">
        <div class="page-num">1</div>
    </div>
    
    <!-- PAGE 2 -->
    <div class="page">
        <img src="page002.jpg" data-pages="1" loading="lazy">
        <div class="page-num">2</div>
    </div>
    
    <!-- PAGE 3 -->
    <div class="page">
        <img src="page003.jpg" data-pages="1" loading="lazy">
        <div class="page-num">3</div>
    </div>
    
    <!-- SPREAD (4–5) -->
    <div class="page">
        <img src="page004-005.jpg" data-pages="2" class="spread" loading="lazy">
        <div class="page-num">4–5</div>
    </div>
    
    <!-- PAGE 6 -->
    <div class="page">
        <img src="page006.jpg" data-pages="1" loading="lazy">
        <div class="page-num">6</div>
    </div>
    
    <!-- PAGE 7 -->
    <div class="page">
        <img src="page007.jpg" data-pages="1" loading="lazy">
        <div class="page-num">7</div>
    </div>
    
    <!-- PAGE 8 -->
    <div class="page">
        <img src="page008.jpg" data-pages="1" loading="lazy">
        <div class="page-num">8</div>
    </div>
    
    <!-- PAGE 9 -->
    <div class="page">
        <img src="page009.jpg" data-pages="1" loading="lazy">
        <div class="page-num">9</div>
    </div>
    
    <!-- PAGE 10 -->
    <div class="page">
        <img src="page010.jpg" data-pages="1" loading="lazy">
        <div class="page-num">10</div>
    </div>
    
    <!-- PAGE 11 -->
    <div class="page">
        <img src="page011.jpg" data-pages="1" loading="lazy">
        <div class="page-num">11</div>
    </div>
    
    <!-- SPREAD (12–13) -->
    <div class="page">
        <img src="page012-013.jpg" data-pages="2" class="spread" loading="lazy">
        <div class="page-num">12–13</div>
    </div>
    
    <!-- PAGE 14 -->
    <div class="page">
        <img src="page014.jpg" data-pages="1" loading="lazy">
        <div class="page-num">14</div>
    </div>
    
    <!-- SPREAD (15–16) -->
    <div class="page">
        <img src="page015-016.jpg" data-pages="2" class="spread" loading="lazy">
        <div class="page-num">15–16</div>
    </div>
    
    <!-- PAGE 17 -->
    <div class="page">
        <img src="page017.jpg" data-pages="1" loading="lazy">
        <div class="page-num">17</div>
    </div>
</div>

<script>
const images = document.querySelectorAll(".reader img");
const counter = document.getElementById("counter");

/* =========================
   PAGE COUNTER (spread-aware)
========================= */
let total = 0;

images.forEach(img => {
    total += parseInt(img.dataset.pages || 1);
});

counter.textContent = `1 / ${total}`;

function updatePage() {
    let current = 1;
    let count = 0;

    images.forEach(img => {
        const rect = img.getBoundingClientRect();
        const pageCount = parseInt(img.dataset.pages || 1);

        if (
            rect.top <= window.innerHeight / 2 &&
            rect.bottom >= window.innerHeight / 2
        ) {
            current = count + 1;
        }

        count += pageCount;
    });

    counter.textContent = `${current} / ${total}`;
}

window.addEventListener("scroll", updatePage);
window.addEventListener("load", updatePage);

/* =========================
   HYBRID PRELOAD (NEXT 3 PAGES)
   - scalable for 50+ pages
========================= */

const totalPages = total; // uses your dataset system

// preload next 3 images after page 1
for (let i = 1; i <= 3; i++) {
    if (images[i]) {
        const img = new Image();
        img.src = images[i].getAttribute("src");
    }
}
</script>

</body>
</html>
