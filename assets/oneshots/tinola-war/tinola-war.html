<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tinola War</title>

<style>
body {
    margin: 0;
    background: #000;
    color: #fff;
    font-family: Arial;
}

/* PAGE COUNTER */
.page-counter {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: rgba(0,0,0,0.7);
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 14px;
    z-index: 1000;
}

/* READER */
.reader {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
}

/* normal pages */
.reader img {
    width: 100%;
    max-width: 800px;
    height: auto;
}

/* spreads */
.reader img.spread {
    max-width: 1400px;
}
</style>
</head>

<body>

<!-- PAGE COUNTER -->
<div class="page-counter" id="counter">1 / 1</div>

<div class="reader">

    <img src="page001.jpg" data-pages="1" >
    <img src="page002.jpg" data-pages="1" loading="lazy">
    <img src="page003.jpg" data-pages="1" loading="lazy">
    <!-- SPREAD (counts as 2 pages) -->
    <img src="page004-005.jpg" class="spread" data-pages="2" loading="lazy">
    <img src="page006.jpg" data-pages="1" loading="lazy">
    <img src="page007.jpg" data-pages="1" loading="lazy">
    <img src="page008.jpg" data-pages="1" loading="lazy">
    <img src="page009.jpg" data-pages="1" loading="lazy">
    <img src="page010.jpg" data-pages="1" loading="lazy">
    <img src="page011.jpg" data-pages="1" loading="lazy">
    <!-- SPREAD (counts as 2 pages) -->
    <img src="page012-013.jpg" class="spread" data-pages="2" loading="lazy">
    <img src="page014.jpg" data-pages="1" loading="lazy">
    <!-- SPREAD (counts as 2 pages) -->
    <img src="page015-016.jpg" class="spread" data-pages="2" loading="lazy">
    <img src="page017.jpg" data-pages="1" loading="lazy">

</div>

<script>
const images = document.querySelectorAll(".reader img");
const counter = document.getElementById("counter");

/* =========================
   PAGE COUNTER (spread-aware)
========================= */
let total = 0;

images.forEach(img => {
    total += parseInt(img.dataset.pages || 1);
});

counter.textContent = `1 / ${total}`;

function updatePage() {
    let current = 1;
    let count = 0;

    images.forEach(img => {
        const rect = img.getBoundingClientRect();
        const pageCount = parseInt(img.dataset.pages || 1);

        if (
            rect.top <= window.innerHeight / 2 &&
            rect.bottom >= window.innerHeight / 2
        ) {
            current = count + 1;
        }

        count += pageCount;
    });

    counter.textContent = `${current} / ${total}`;
}

window.addEventListener("scroll", updatePage);
window.addEventListener("load", updatePage);

/* =========================
   HYBRID PRELOAD (NEXT 3 PAGES)
   - scalable for 50+ pages
========================= */

const totalPages = total; // uses your dataset system

// preload next 3 images after page 1
for (let i = 1; i <= 3; i++) {
    if (images[i]) {
        const img = new Image();
        img.src = images[i].getAttribute("src");
    }
}
</script>

</body>
</html>
