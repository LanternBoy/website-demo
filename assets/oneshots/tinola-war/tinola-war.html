<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tinola War</title>

<style>
body {
    margin: 0;
    background: #000;
    color: #fff;
    font-family: Arial;
}

/* PAGE COUNTER */
.page-counter {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: rgba(0,0,0,0.7);
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 14px;
    z-index: 1000;
}

/* READER */
.reader {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
}

/* normal pages */
.reader img {
    width: 100%;
    max-width: 800px;
    height: auto;
}

/* spreads */
.reader img.spread {
    max-width: 1400px;
}
</style>
</head>

<body>

<!-- PAGE COUNTER -->
<div class="page-counter" id="counter">1 / 1</div>

<div class="reader">

    <img src="page1.jpg" data-pages="1">
    <img src="page2.jpg" data-pages="1">
    <img src="page3.jpg" data-pages="1">
    <!-- SPREAD (counts as 2 pages) -->
    <img src="page4.jpg" class="spread" data-pages="2">

</div>

<script>
const pages = document.querySelectorAll(".reader img");
const counter = document.getElementById("counter");

// total pages (based on data-pages)
let total = 0;
pages.forEach(img => {
    total += parseInt(img.dataset.pages || 1);
});

counter.textContent = `1 / ${total}`;

function updatePage() {
    let current = 1;
    let count = 0;

    pages.forEach(img => {
        const rect = img.getBoundingClientRect();
        const pageCount = parseInt(img.dataset.pages || 1);

        // check if image is in center of screen
        if (rect.top <= window.innerHeight / 2 &&
            rect.bottom >= window.innerHeight / 2) {
            current = count + 1;
        }

        count += pageCount;
    });

    counter.textContent = `${current} / ${total}`;
}

window.addEventListener("scroll", updatePage);
window.addEventListener("load", updatePage);
</script>

</body>
</html>
